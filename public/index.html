<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Drive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0f14;
  --surface: #13161d;
  --surface2: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #4f8eff;
  --accent2: #7c3aed;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e8eaf0;
  --text2: #7b8196;
  --text3: #4a4f63;
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  display: flex;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  gap: 8px;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 10px 20px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text2);
  font-weight: 500;
  transition: all 0.15s ease;
}

.menu-item:hover, .menu-item.active {
  background: var(--surface2);
  color: var(--text);
}

.menu-item.active {
  background: rgba(79, 142, 255, 0.1);
  color: var(--accent);
}

.menu-icon {
  font-size: 15px;
  width: 18px;
  text-align: center;
}

.sidebar-footer {
  margin-top: auto;
  padding: 16px 12px 0;
  border-top: 1px solid var(--border);
}

.storage-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
}

.storage-bar {
  height: 4px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}

.storage-fill {
  height: 100%;
  width: 34%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
}

/* ── Main ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Topbar ── */
.topbar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}

.topbar-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 320px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}

.search {
  width: 100%;
  padding: 9px 14px 9px 36px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}

.search:focus {
  border-color: var(--accent);
}

.search::placeholder { color: var(--text3); }

/* ── Content ── */
.content {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Files section ── */
.files-section {
  flex: 1;
  padding: 24px 28px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Upload Box ── */
.upload-box {
  background: var(--surface);
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  padding: 28px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  transition: border-color 0.2s;
}

.upload-box:hover {
  border-color: rgba(79, 142, 255, 0.4);
}

.upload-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.upload-icon-wrap {
  width: 44px;
  height: 44px;
  background: rgba(79, 142, 255, 0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.upload-text strong {
  display: block;
  font-weight: 600;
  margin-bottom: 3px;
}

.upload-text span {
  color: var(--text2);
  font-size: 12px;
}

.file-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

#fileInput {
  display: none;
}

.file-label {
  padding: 8px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}

.file-label:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--accent);
}

#selectedFileName {
  font-size: 12px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.upload-btn {
  padding: 9px 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
}

.upload-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.upload-btn:active { transform: translateY(0); }

/* ── Table ── */
.table-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}

.table-header-row {
  display: flex;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
}

.col-name { flex: 1; }
.col-actions { width: 150px; text-align: right; }

.file-row {
  display: flex;
  align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.file-row:last-child { border-bottom: none; }
.file-row:hover { background: var(--surface2); }

.file-name-cell {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}

.file-type-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.file-name-text {
  font-weight: 500;
  color: var(--text);
  font-size: 13.5px;
}

.file-actions {
  width: 150px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.action-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.15s;
}

.btn-download {
  background: rgba(79, 142, 255, 0.12);
  color: var(--accent);
  border: 1px solid rgba(79, 142, 255, 0.25);
}

.btn-download:hover {
  background: rgba(79, 142, 255, 0.22);
}

.btn-delete {
  background: rgba(239, 68, 68, 0.1);
  color: var(--red);
  border: 1px solid rgba(239, 68, 68, 0.2);
}

.btn-delete:hover {
  background: rgba(239, 68, 68, 0.2);
}

.empty-state {
  padding: 48px 20px;
  text-align: center;
  color: var(--text3);
}

.empty-state .empty-icon {
  font-size: 32px;
  margin-bottom: 12px;
}

/* ── Activity ── */
.activity-section {
  margin-top: 4px;
  padding: 8px 0;
}

.activity-header {
  padding: 6px 10px 8px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
}

.activity-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 220px;
  overflow-y: auto;
}

.activity-item {
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.activity-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.activity-file {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 130px;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 5px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.badge-upload { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
.badge-download { background: rgba(79, 142, 255, 0.15); color: #7baeff; }
.badge-delete { background: rgba(239, 68, 68, 0.15); color: #f87171; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* Alert replacement */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.25s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success { border-color: rgba(34, 197, 94, 0.4); }
.toast.error { border-color: rgba(239, 68, 68, 0.4); }
</style>
</head>

<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">☁️</div>
    Cloud Drive
  </div>

  <div class="menu-item active" onclick="loadFiles()">
    <span class="menu-icon">📁</span> My Files
  </div>

  <div class="activity-section">
    <div class="activity-header">Recent Activity</div>
    <div class="activity-list" id="activity"></div>
  </div>

  <div class="sidebar-footer">
    <div class="storage-label">
      <span>Storage</span>
      <span>3.4 / 10 GB</span>
    </div>
    <div class="storage-bar">
      <div class="storage-fill"></div>
    </div>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <div class="topbar-title">Dashboard</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search" placeholder="Search files…" oninput="searchFiles(this.value)">
    </div>
  </div>

  <div class="content">

    <div class="files-section">

      <!-- Upload -->
      <div class="upload-box">
        <div class="upload-left">
          <div class="upload-icon-wrap">📤</div>
          <div class="upload-text">
            <strong>Upload a file</strong>
            <span>Select any file from your device</span>
          </div>
        </div>
        <div class="file-input-wrap">
          <input type="file" id="fileInput" name="file">
          <label class="file-label" for="fileInput" id="fileLabel">Choose file</label>
          <span id="selectedFileName">No file chosen</span>
          <button class="upload-btn" onclick="handleUpload()">Upload</button>
        </div>
      </div>

      <!-- File Table -->
      <div class="table-wrap">
        <div class="table-header-row">
          <div class="col-name">File Name</div>
          <div class="col-actions">Actions</div>
        </div>
        <div id="files"></div>
      </div>

    </div>



  </div>
</div>

<script>
const filesContainer = document.getElementById("files");
const fileInput = document.getElementById("fileInput");
const selectedFileName = document.getElementById("selectedFileName");

let allFiles = [];

// File input label update
fileInput.addEventListener("change", () => {
  const name = fileInput.files[0]?.name;
  selectedFileName.textContent = name || "No file chosen";
});

// Toast notification
function showToast(msg, type = "success") {
  const toast = document.getElementById("toast");
  toast.textContent = (type === "success" ? "✓ " : "✕ ") + msg;
  toast.className = "toast show " + type;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.className = "toast"; }, 3000);
}

// File type icon
function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = {
    pdf: '📄', png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', webp: '🖼️',
    mp4: '🎬', mov: '🎬', avi: '🎬', mp3: '🎵', wav: '🎵',
    zip: '🗜️', rar: '🗜️', tar: '🗜️',
    js: '⚙️', ts: '⚙️', py: '⚙️', html: '🌐', css: '🌐',
    txt: '📝', md: '📝', csv: '📊', xlsx: '📊', xls: '📊',
    docx: '📋', doc: '📋', pptx: '📊', ppt: '📊',
  };
  return map[ext] || '📁';
}

// UPLOAD (same logic)
async function handleUpload() {
  if (!fileInput.files[0]) { showToast("Please select a file first", "error"); return; }

  const data = new FormData();
  data.append("file", fileInput.files[0]);

  const res = await fetch("/api/files/upload", {
    method: "POST",
    body: data
  });

  const text = await res.text();
  console.log(text);

  showToast("File uploaded successfully!");
  fileInput.value = "";
  selectedFileName.textContent = "No file chosen";
  loadFiles();
}

// LOAD FILES (same logic)
async function loadFiles() {
  const res = await fetch("/api/files");
  const files = await res.json();
  allFiles = files;
  render(files);
  loadActivity();
}

// RENDER TABLE (same logic)
function render(files) {
  filesContainer.innerHTML = "";

  if (!files.length) {
    filesContainer.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div>No files found</div>
      </div>`;
    return;
  }

  files.forEach(f => {
    const row = document.createElement("div");
    row.className = "file-row";
    row.innerHTML = `
      <div class="file-name-cell">
        <div class="file-type-icon">${fileIcon(f.name)}</div>
        <span class="file-name-text">${f.name}</span>
      </div>
      <div class="file-actions">
        <a href="/api/files/download/${f.name}" style="text-decoration:none;">
          <button class="action-btn btn-download">↓ Download</button>
        </a>
        <button class="action-btn btn-delete" onclick="deleteFile('${f.name}')">Delete</button>
      </div>
    `;
    filesContainer.appendChild(row);
  });
}

// SEARCH (same logic)
function searchFiles(q) {
  const filtered = allFiles.filter(f =>
    f.name.toLowerCase().includes(q.toLowerCase())
  );
  render(filtered);
}

// DELETE (same logic)
async function deleteFile(name) {
  await fetch("/api/files/" + name, { method: "DELETE" });
  showToast(`"${name}" deleted`);
  loadFiles();
}

// ACTIVITY (same logic)
async function loadActivity() {
  const res = await fetch("/api/activity");
  const data = await res.json();

  const div = document.getElementById("activity");
  div.innerHTML = "";

  data.forEach(a => {
    let cls = "badge-upload";
    if (a.action === "DOWNLOAD") cls = "badge-download";
    if (a.action === "DELETE") cls = "badge-delete";

    div.innerHTML += `
      <div class="activity-item">
        <div class="activity-top">
          <span class="activity-file">${a.file}</span>
          <span class="badge ${cls}">${a.action}</span>
        </div>
      </div>
    `;
  });
}

loadFiles();
</script>

</body>
</html>
